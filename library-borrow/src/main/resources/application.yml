# 业务自定义配置
library:
  rabbitmq:
    # 逾期检查延迟队列的 TTL（毫秒）：一条逾期检查消息延迟多久后触发。
    # 生产环境应等于借阅时长 30 天 = 2592000000；演示/测试可调小（如 60000 = 1分钟）。
    overdue-delay-ms: 2592000000

mybatis-plus:
  mapper-locations: classpath*:mapper/*.xml
  type-aliases-package: com.wxx.library.common.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

server:
  port: 8083

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.wxx.library.borrow: DEBUG
