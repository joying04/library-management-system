      config:
        server-addr: 192.168.157.129:8848
        namespace: 
        group: DEFAULT_GROUP
        file-extension: yaml
        import-check:
          enabled: false
    openfeign:
      client:
        config:
          default:
            connect-timeout: 5000
            read-timeout: 10000
      sentinel:
        enabled: true
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://192.168.157.129:3306/library_borrow_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: wxx147258
  data:
    redis:
      host: 192.168.157.129
      port: 6379
      password: 
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 2000ms
  rabbitmq:
    host: 192.168.157.129
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 10
