server:
  port: 8081

spring:
  application:
    name: library-user

  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:192.168.157.129:8848}
        namespace: ${NACOS_NAMESPACE:}
      config:
        server-addr: ${NACOS_ADDR:192.168.157.129:8848}
        file-extension: yml
        import-check:
          enabled: false  # 禁用 Nacos 配置检查，使用本地配置

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:192.168.157.129}:${MYSQL_PORT:3306}/library_user_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:wxx147258}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1800000

  data:
    redis:
      host: ${REDIS_HOST:192.168.157.129}
      port: ${REDIS_PORT:6379}
      database: 0
      password: ""
      timeout: 5000

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.wxx.library.common.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: AUTO
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  header: Authorization
  secret: ${JWT_SECRET:default-jwt-secret-key-for-test-123456}
  expire: 3600000
  refresh-expire: 86400000
  prefix: "Bearer "

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.wxx.library.user: DEBUG
